<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabri // Language Select</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* Variáveis e Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #07070a;
            --primary-neon: #00ff41;
            --secondary-neon: #00e0ff;
            --text-light: #f0f0f0;
            --text-muted: #888888;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centraliza verticalmente o conteúdo */
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Canvas (Fundo Matrix) - Estilos copiados para manter a consistência */
        #matrixCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.2;
        }
        body::before { /* Efeito de Scanline */
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background: repeating-linear-gradient(transparent 0, rgba(0, 0, 0, 0.2) 1px, transparent 2px);
            opacity: 0.1; z-index: 1;
        }

        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: 700; margin-bottom: 5px;
            color: var(--primary-neon); text-shadow: 0 0 15px var(--primary-neon);
            z-index: 2;
        }
        h1 span { color: var(--secondary-neon); }

        p.bio {
            font-size: 18px; text-align: center; margin-bottom: 50px;
            color: var(--text-muted); text-shadow: 0 0 3px rgba(0, 255, 65, 0.5);
            z-index: 2;
        }

        .lang-container {
            display: flex;
            gap: 30px; /* Espaço entre os botões de idioma */
            z-index: 2;
        }

        .lang-button {
            display: block;
            background-color: #1a1a2e;
            color: var(--text-light);
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            
            border: 2px solid var(--secondary-neon);
            box-shadow: 0 0 10px rgba(0, 224, 255, 0.5);
            
            transition: all 0.3s ease-in-out;
            cursor: pointer;
        }

        .lang-button:hover {
            background-color: #2c2c47;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-neon), 0 0 30px rgba(0, 224, 255, 0.8);
            border-color: var(--primary-neon);
        }

        footer {
            position: fixed;
            bottom: 20px;
            font-size: 13px;
            color: var(--text-muted);
            z-index: 2;
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    
    <h1>FABRI <span>//_</span></h1>
    <p class="bio">// SELECIONE O IDIOMA / SELECT LANGUAGE //</p>

    <div class="lang-container">
        <a href="links-pt-br.html" class="lang-button">🇧🇷 PORTUGUÊS (BR)</a>
        <a href="links-un-gb.html" class="lang-button">🇬🇧 ENGLISH (UK)</a>
    </div>

    <footer>
        > ACCESS REQUIRED { V0.1 }
    </footer>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;':\",.<>/?`~";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) { drops[i] = 1; }

        function draw() {
            ctx.fillStyle = 'rgba(7, 7, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = canvas.width / fontSize;
            drops.length = 0;
            for (let i = 0; i < columns; i++) { drops[i] = 1; }
        });
        setInterval(draw, 33);
    </script>
</body>
</html>
